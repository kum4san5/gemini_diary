<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Diary</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7f9;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
            position: relative; /* ローディングスピナーのために追加 */
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* ダークモードが有効な場合のスタイル */
        body.dark-mode {
            background-color: #2c2c2c; /* 暗い背景 */
            color: #e0e0e0; /* 明るい文字色 */
        }

        body.dark-mode .container {
            background-color: #3a3a3a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        body.dark-mode h1 {
            color: #7ab3f7; /* 明るめのプライマリカラー */
        }

        body.dark-mode label {
            color: #e0e0e0;
        }

        body.dark-mode input[type="date"],
        body.dark-mode textarea {
            background-color: #4a4a4a;
            border-color: #666;
            color: #e0e0e0;
        }

        body.dark-mode input[type="date"]::placeholder,
        body.dark-mode textarea::placeholder {
            color: #bbb;
        }

        body.dark-mode button {
            background-color: #5b9bd5;
        }

        body.dark-mode button:hover {
            background-color: #4a8cd3;
        }

        body.dark-mode button:disabled {
            background-color: #555;
            color: #aaa;
        }


        /* ダークモード切り替えボタンのスタイル */
        .dark-mode-toggle {
            position: fixed; /* ページ内の特定の位置に固定 */
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: #007bff; /* ボタンの背景色 */
            color: white; /* ボタンの文字色 */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            z-index: 1000; /* 他の要素より手前に表示 */
            transition: background-color 0.3s ease;
        }

        .dark-mode-toggle:hover {
            background-color: #0056b3;
        }

        /* ダークモード時のボタンのスタイル（任意） */
        body.dark-mode .dark-mode-toggle {
            background-color: #28a745;
        }

        body.dark-mode .dark-mode-toggle:hover {
            background-color: #218838;
        }

        /* ローディングスピナーのスタイル */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 半透明のオーバーレイ */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden; /* 初期状態では非表示 */
            opacity: 0; /* 透明度も0 */
            transition: visibility 0s, opacity 0.3s ease-in-out;
        }

        .loading-overlay.visible {
            visibility: visible;
            opacity: 1;
        }

        .spinner {
            border: 8px solid rgba(255, 255, 255, 0.3); /* 薄い灰色の円 */
            border-top: 8px solid #ffffff; /* 白い回転部分 */
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite; /* 1秒で1回転、無限に */
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- ... 既存のヘッダーやナビゲーションなど ... -->

    <button class="dark-mode-toggle" id="darkModeToggle">ダークモードを切り替え</button>

    <!-- ... 既存のメインコンテンツ ... -->
    <main>
        <div class="container">
            <h1>AI English Diary</h1>
            
            <div class="form-group">
                <label for="date">日付</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label for="diary">今日の出来事（英語）</label>
                <textarea id="diary" placeholder="Today, I went to..."></textarea>
            </div>

            <button id="submit-btn">AI先生に添削してもらう</button>
        </div>
    </main>

    <!-- ローディングスピナーのHTMLを追加 -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- ... 既存のフッターなど ... -->
    <!-- ... 既存のJavaScriptファイルへのリンクなど ... -->
<script src="app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.getElementById('darkModeToggle');
            const body = document.body;

            // ユーザーのOSのテーマ設定を検出 (初回訪問時など)
            const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");

            // ローカルストレージからユーザーの設定を読み込む
            const savedTheme = localStorage.getItem('theme');

            if (savedTheme === 'dark') {
                body.classList.add('dark-mode');
            } else if (savedTheme === 'light') {
                body.classList.remove('dark-mode');
            } else if (prefersDarkScheme.matches) {
                // ローカルストレージに設定がない場合、OSの設定に従う
                body.classList.add('dark-mode');
            }

            // ボタンがクリックされたときの処理
            toggleButton.addEventListener('click', () => {
                body.classList.toggle('dark-mode'); // dark-modeクラスを付け外しする

                // 現在のテーマをローカルストレージに保存する
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                } else {
                    localStorage.setItem('theme', 'light');
                }
            });
        });
    </script>
</body>
</html>
